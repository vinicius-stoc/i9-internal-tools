{% extends 'base.html' %}
{% load static %}

{% block title %}SGQ - Controle de RNCs{% endblock %}

{% block content %}
{% csrf_token %}

<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.2/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
    .tabulator { border: none !important; border-radius: 8px; }
    .tabulator-header { background-color: #f8f9fa !important; color: #495057 !important; font-weight: 600; }
    .tabulator-row:nth-child(even) { background-color: #fcfcfc !important; }
    .tabulator-row:hover { background-color: #f1f3f5 !important; }
</style>

<div class="container-fluid p-0">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-0 text-dark fw-bold">
                <i class="bi bi-shield-check me-2" style="color: var(--azul-principal);"></i>Gestão de RNCs
            </h3>
            <p class="text-muted small mb-0">Registros de Não Conformidades</p>
        </div>

        <div class="d-flex gap-2">
            <button type="button" class="btn btn-primary shadow-sm border-0" data-bs-toggle="modal" data-bs-target="#modalNovaRNC">
                <i class="bi bi-plus-lg me-2"></i>Nova RNC
            </button>

            <button id="download-xlsx" class="btn btn-success shadow-sm border-0">
                <i class="bi bi-file-earmark-excel me-2"></i>Exportar Planilha
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-3">
            <div id="tabela-rnc"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNovaRNC" tabindex="-1" aria-labelledby="modalNovaRNCLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalNovaRNCLabel"><i class="bi bi-plus-circle me-2"></i>Novo Registo Preliminar de NC</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form id="formNovaRNC">
                <div class="modal-body bg-light">
                    <div class="row g-3">

                        <div class="col-md-4">
                            <label class="form-label fw-bold small">Local/Setor *</label>
                            <select name="local_id" class="form-select shadow-sm" required>
                                <option value="">Selecione...</option>
                                {% for local in locais %}
                                    <option value="{{ local.id }}">{{ local.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small">Tipo de NC *</label>
                            <select name="tipo_nc_id" class="form-select shadow-sm" required>
                                <option value="">Selecione...</option>
                                {% for tipo in tipos_nc %}
                                    <option value="{{ tipo.id }}">{{ tipo.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small">Equipamento (Opcional)</label>
                            <select name="equipamento_id" class="form-select shadow-sm">
                                <option value="">Nenhum / Não se aplica</option>
                                {% for eqp in equipamentos %}
                                    <option value="{{ eqp.id }}">{{ eqp.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold small">Detector *</label>
                            <select name="detector" class="form-select shadow-sm" required>
                                <option value="">Selecione...</option>
                                <option value="Cliente">Cliente</option>
                                <option value="Interno">Interno</option>
                                <option value="Auditor Interno">Auditor Interno</option>
                                <option value="Auditor Externo">Auditor Externo</option>
                                <option value="Fornecedor">Fornecedor</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small">Classificação *</label>
                            <select name="classificacao" class="form-select shadow-sm" required>
                                <option value="">Selecione...</option>
                                <option value="Sistema">Sistema</option>
                                <option value="Produto">Produto</option>
                                <option value="Processo">Processo</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small">Criticidade *</label>
                            <select name="criticidade" class="form-select shadow-sm" required>
                                <option value="">Selecione...</option>
                                <option value="Alto">Alto</option>
                                <option value="Médio">Médio</option>
                                <option value="Baixo">Baixo</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold small">Descrição da Não Conformidade *</label>
                            <textarea name="descricao" class="form-control shadow-sm" rows="4" required placeholder="Descreva o problema de forma clara e objetiva..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnSalvarNovaRNC">
                        <i class="bi bi-save me-1"></i> Criar Registo
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

    // Função para exibir a data no padrão Brasileiro na tabela
    var formatarDataBR = function(cell){
        let val = cell.getValue();
        if(val && val.includes('-')){
            let parts = val.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        return val || "-";
    };

    // Inicializa a tabela
    var table = new Tabulator("#tabela-rnc", {
        ajaxURL: "{% url 'api_listar_rncs' %}",
        layout: "fitDataFill",
        responsiveLayout: "collapse",
        pagination: "local",
        paginationSize: 15,
        initialSort: [{column: "id", dir: "desc"}],
        resizableColumns: true,
        movableColumns: true,

        columns: [
            {title: "Ações", field: "acoes", width: 90, hozAlign: "center", formatter: function(cell){
                return `<button class="btn btn-sm btn-primary py-0 btn-editar-rnc" title="Editar RNC completo">
                            <i class="bi bi-pencil-square"></i> Editar
                        </button>`;
            }, cellClick: function(e, cell){
                // Quando clicar no botão, vamos pegar os dados daquela linha!
                let dadosDaLinha = cell.getRow().getData();
                abrirModalEdicao(dadosDaLinha);
            }},

            {title: "ID", field: "id", width: 70, headerFilter: "input", frozen: false},

            {title: "Status", field: "status", width: 140, headerFilter: "list", headerFilterParams: {valuesLookup:true, clearable:true},
             editor: "list", editorParams: {values: ["Não iniciada", "Em andamento", "Concluído", "Fora dos trilhos", "Registro preliminar", "Cancelado"]},
             formatter: function(cell) {
                 let val = cell.getValue();
                 let color = "secondary";
                 if(val === "Em andamento") color = "primary";
                 if(val === "Concluído") color = "success";
                 if(val === "Fora dos trilhos") color = "danger";
                 if(val === "Registro preliminar") color = "warning text-dark";
                 return `<span class="badge bg-${color} w-100">${val}</span>`;
             }
            },

            {title: "Registrador", field: "registrador", width: 150, headerFilter: "input"},

            {title: "Detector", field: "detector", width: 120, headerFilter: "list", headerFilterParams: {valuesLookup:true, clearable:true},
             editor: "list", editorParams: {values: ["Cliente", "Interno", "Auditor Interno", "Auditor Externo", "Fornecedor"]}},

            {title: "Data Abertura", field: "data_abertura", width: 120, headerFilter: "input", formatter: formatarDataBR},

            {title: "Projeto", field: "projeto_cod", width: 110, headerFilter: "input", editor: "input"},

            {title: "Elemento Rast.", field: "elemento_rastreador", width: 130, headerFilter: "input", editor: "input"},

            {title: "Local", field: "local", width: 130, headerFilter: "input"},
            {title: "Equipamento", field: "equipamento", width: 160, headerFilter: "input"},

            {title: "Classificação", field: "classificacao", width: 130, headerFilter: "list", headerFilterParams: {valuesLookup:true, clearable:true},
             editor: "list", editorParams: {values: ["Sistema", "Produto", "Processo"]}},

            {title: "Criticidade", field: "criticidade", width: 110, headerFilter: "list", headerFilterParams: {valuesLookup:true, clearable:true},
             editor: "list", editorParams: {values: ["Alto", "Médio", "Baixo"]}},

            {title: "Justificativa Criticidade", field: "justificativa_criticidade", width: 250, formatter: "textarea", editor: "textarea"},

            {title: "Tipo NC", field: "tipo_nc", width: 150, headerFilter: "input"},

            {title: "Descrição da NC", field: "descricao", width: 300, formatter: "textarea", editor: "textarea"},
            {title: "Correção Imediata", field: "correcao", width: 250, formatter: "textarea", editor: "textarea"},
            {title: "Causas Principais", field: "causas_principais", width: 250, formatter: "textarea", editor: "textarea"},
            {title: "Ação Corretiva", field: "acao_corretiva", width: 250, formatter: "textarea", editor: "textarea"},
            {title: "Eficácia (Texto)", field: "eficacia_texto", width: 250, formatter: "textarea", editor: "textarea"},

            {title: "Responsáveis", field: "responsaveis", width: 200, headerFilter: "input"},

            {title: "Prev. Conclusão", field: "data_prevista_conclusao", width: 130, formatter: formatarDataBR},
            {title: "Encerramento", field: "data_encerramento", width: 130, formatter: formatarDataBR, editor: "date", editorParams:{ format:"yyyy-MM-dd" }},

            {title: "Ishikawa", field: "ishikawa_link", width: 100, formatter: function(cell){
                let url = cell.getValue();
                if(url) return `<a href="${url}" target="_blank" class="text-primary text-decoration-none">Acessar</a>`;
                return "-";
            }},
            {title: "Eficácia PDF", field: "eficacia_pdf", width: 110, formatter: function(cell){
                let url = cell.getValue();
                if(url) return `<a href="${url}" target="_blank" class="btn btn-sm btn-outline-danger py-0" style="font-size: 0.75rem;"><i class="bi bi-file-pdf"></i> PDF</a>`;
                return "-";
            }},

            {title: "Imagens", field: "qtd_imagens", width: 90, formatter: function(cell){
                let qtd = cell.getValue();
                if(qtd > 0) {
                    let url = cell.getRow().getData().primeira_imagem_url;
                    return `<a href="${url}" target="_blank" class="btn btn-sm btn-outline-primary py-0" style="font-size: 0.75rem;"><i class="bi bi-image"></i> (${qtd})</a>`;
                }
                return "-";
            }}
        ],
        locale: "pt-br",
        langs: {
            "pt-br": { pagination: { first: "Primeira", last: "Última", prev: "Anterior", next: "Próxima" } }
        }
    });

    // Gatilho de Edição Inline do Tabulator
    table.on("cellEdited", function(cell){
        let id_rnc = cell.getRow().getData().id;
        let campo_editado = cell.getField();
        let novo_valor = cell.getValue();

        let csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
        if(!csrfInput) {
            console.log("ERRO CRÍTICO: Token CSRF não encontrado no HTML!");
            return;
        }
        let csrfToken = csrfInput.value;

        fetch(`/qualidade/api/rncs/${id_rnc}/atualizar/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({
                campo: campo_editado,
                valor: novo_valor
            })
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'sucesso'){
                cell.getElement().style.backgroundColor = "#d1e7dd";
            } else {
                alert("O SERVIDOR RECUSOU: " + data.mensagem);
                cell.restoreOldValue();
            }
        })
        .catch(error => {
            console.log("ERRO DE REDE/FETCH: Não conseguiu falar com o servidor.");
            cell.restoreOldValue();
        });
    });

    // Exportação Excel
    document.getElementById("download-xlsx").addEventListener("click", function(){
        table.download("xlsx", "Controle_RNCs_I9TMG.xlsx", {sheetName:"RNCs"});
    });

    // Modal
    document.getElementById("formNovaRNC").addEventListener("submit", function(event){
        event.preventDefault();

        let formData = new FormData(this);
        let payload = Object.fromEntries(formData.entries());

        // Pega o token de segurança para enviar pro Django
        let csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        // Muda o botão para "Salvando..." para dar feedback ao usuário
        let btnSalvar = document.getElementById("btnSalvarNovaRNC");
        let textoOriginal = btnSalvar.innerHTML;
        btnSalvar.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Salvando...';
        btnSalvar.disabled = true;

        // Dispara o POST para a nossa nova URL do Django
        fetch("{% url 'api_criar_rnc' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'sucesso'){
                var modalEl = document.getElementById('modalNovaRNC');
                var modalInstance = bootstrap.Modal.getInstance(modalEl);
                modalInstance.hide();
                document.getElementById('formNovaRNC').reset();
                table.setData();
            } else {
                alert("O BACKEND RECUSOU A CRIAÇÃO:\n" + data.mensagem);
            }
        })
        .catch(error => {
            console.error("Erro na requisição JS:", error);
            alert("Erro de conexão com o servidor. Veja o Console (F12).");
        })
        .finally(() => {
            // Volta o botão ao normal independente se deu certo ou errado
            btnSalvar.innerHTML = textoOriginal;
            btnSalvar.disabled = false;
        });
    });
});

</script>
{% endblock %}
