{% extends 'base.html' %}
{% load static %}

{% block title %}SGQ - Controle de RNCs{% endblock %}

{% block content %}
<link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
<script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
<script src="https://oss.sheetjs.com/sheetjs/xlsx.full.min.js"></script>

<style>
    /* Pequeno ajuste para a tabela ficar com visual limpo de ERP */
    .tabulator { border: none !important; border-radius: 8px; }
    .tabulator-header { background-color: #f8f9fa !important; color: #495057 !important; font-weight: 600; }
    .tabulator-row:nth-child(even) { background-color: #fcfcfc !important; }
    .tabulator-row:hover { background-color: #f1f3f5 !important; }
</style>

<div class="container-fluid p-0">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-0 text-dark fw-bold">
                <i class="bi bi-shield-check me-2" style="color: var(--azul-principal);"></i>Gestão de RNCs
            </h3>
            <p class="text-muted small mb-0">Registros de Não Conformidades</p>
        </div>
        <div class="d-flex gap-2">
            <button id="download-xlsx" class="btn btn-success shadow-sm border-0">
                <i class="bi bi-file-earmark-excel me-2"></i>Exportar Planilha
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-3">
            <div id="tabela-rnc"></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        // 2. Inicialização do Motor da Tabela
        var table = new Tabulator("#tabela-rnc", {
            ajaxURL: "{% url 'api_listar_rncs' %}", // Aponta para a sua API Python
            layout: "fitDataFill", // Ajusta a largura das colunas dinamicamente
            responsiveLayout: "collapse", // Se a tela for pequena (celular), cria um botão de "+" para expandir
            pagination: "local", // Pagina no navegador
            paginationSize: 15,
            movableColumns: true, // Permite ao usuário arrastar as colunas para reordenar
            initialSort: [
                {column: "id", dir: "desc"}, // Por padrão, a RNC mais nova fica no topo
            ],
            
            // 3. Mapeamento das Colunas (A chave 'field' deve ser idêntica ao seu JSON)
            columns: [
                {title: "ID", field: "id", width: 80, headerFilter: "input"},
                
                // Formatação visual do Status com Badges do Bootstrap
                {title: "Status", field: "status", width: 150, headerFilter: "select", headerFilterParams: {values: true},
                 formatter: function(cell) {
                     let val = cell.getValue();
                     let color = "secondary";
                     if(val === "Em andamento") color = "primary";
                     if(val === "Concluído") color = "success";
                     if(val === "Fora dos trilhos") color = "danger";
                     if(val === "Registro preliminar") color = "warning text-dark";
                     return `<span class="badge bg-${color}">${val}</span>`;
                 }
                },
                
                {title: "Data Abertura", field: "data_abertura", width: 130, headerFilter: "input"},
                {title: "Projeto", field: "projeto_cod", width: 110, headerFilter: "input"},
                {title: "Classificação", field: "classificacao", width: 130, headerFilter: "select", headerFilterParams: {values: true}},
                {title: "Criticidade", field: "criticidade", width: 110, headerFilter: "select", headerFilterParams: {values: true}},
                {title: "Equipamento", field: "equipamento", width: 180, headerFilter: "input"},
                {title: "Local", field: "local", width: 130, headerFilter: "input"},
                {title: "Tipo NC", field: "tipo_nc", width: 160, headerFilter: "input"},
                {title: "Registrado por", field: "registrador", width: 150, headerFilter: "input"},
                {title: "Responsáveis", field: "responsaveis", width: 220, headerFilter: "input"},
                {title: "Prev. Conclusão", field: "data_prevista_conclusao", width: 140},
            ],
            
            // Tradução nativa para Português
            locale: "pt-br",
            langs: {
                "pt-br": {
                    "pagination": {
                        "first": "Primeira", "first_title": "Primeira Página",
                        "last": "Última", "last_title": "Última Página",
                        "prev": "Anterior", "prev_title": "Página Anterior",
                        "next": "Próxima", "next_title": "Próxima Página",
                    }
                }
            }
        });

        // 4. Gatilho do Botão de Exportação Excel
        document.getElementById("download-xlsx").addEventListener("click", function(){
            // Exporta exatamente o que o usuário está vendo (com filtros aplicados)
            table.download("xlsx", "Controle_RNCs_I9TMG.xlsx", {sheetName:"RNCs"});
        });
    });
</script>
{% endblock %}
