{% extends 'base.html' %}
{% block title %}Importar base de RH{% endblock %}

{% block content %}
<div class="container-fluid py-3">
    <div class="i9-page-header">
        <div>
            <h1 class="i9-page-title">Atualizar base de colaboradores</h1>
            <p class="i9-page-description">Envie a planilha atualizada da folha para identificar contratações e demissões.</p>
        </div>
        <div class="i9-page-actions">
            <a href="{% url 'dashboard_rh' %}" class="btn i9-btn-secondary">Voltar para o dashboard</a>
        </div>
    </div>

    <section class="i9-card i9-form-narrow">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="i9-upload-box mb-4">
                <label class="form-label fw-bold">Arquivo Excel (.xls ou .xlsx)</label>
                <input class="form-control form-control-lg" type="file" name="arquivo_excel" accept=".xls,.xlsx" required>
            </div>
            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'dashboard_rh' %}" class="btn i9-btn-secondary">Cancelar</a>
                <button type="submit" class="btn i9-btn-primary btn-lg fw-bold">
                    Iniciar processamento
                </button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
