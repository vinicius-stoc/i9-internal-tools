name: Deploy Automático para PythonAnywhere

on:
  push:
    branches:
      - main


jobs:
  quality:
    name: Validar Django
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: ":memory:"
      DB_USER: ""
      DB_PASSWORD: ""
      DB_HOST: ""
      DB_PORT: ""

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Validar configuracao Django
        run: python manage.py check

      - name: Validar migrations pendentes
        run: python manage.py makemigrations --check --dry-run

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Executar Atualização via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.pythonanywhere.com
          username: ${{ secrets.PA_USERNAME }}
          key: ${{ secrets.PA_SSH_KEY }}
          script: |
            # Entra na pasta do projeto
            cd /home/${{ secrets.PA_USERNAME }}/sistema_i9tmg
            
            # Puxa o código novo do GitHub
            git pull origin main
            
            # Ativa o ambiente virtual no caminho correto
            source /home/${{ secrets.PA_USERNAME }}/venv/bin/activate
            
            # Instala dependências, roda migrações e coleta estáticos de forma silenciosa
            pip install -r requirements.txt
            python manage.py migrate
            python manage.py collectstatic --noinput

      # Avisa o PythonAnywhere para reiniciar a aplicação via API REST
      - name: Reiniciar a Aplicação Web (Reload WSGI)
        run: |
          curl --fail -X POST \
            https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_DOMAIN }}/reload/ \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}"

      - name: Reiniciar Always-on Tasks
        env:
          PA_ALWAYS_ON_TASK_IDS: ${{ secrets.PA_ALWAYS_ON_TASK_IDS }}
        run: |
          if [ -z "$PA_ALWAYS_ON_TASK_IDS" ]; then
            echo "PA_ALWAYS_ON_TASK_IDS nao configurado; reinicio ignorado."
            exit 0
          fi

          IFS=',' read -ra TASK_IDS <<< "$PA_ALWAYS_ON_TASK_IDS"
          for task_id in "${TASK_IDS[@]}"; do
            curl --fail -X POST \
              "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/always_on/${task_id}/restart/" \
              -H "Authorization: Token ${{ secrets.PA_TOKEN }}"
          done
