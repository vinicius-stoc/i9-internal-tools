<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | I9TMG ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* Variáveis de Branding da I9 TMG - Puxe do seu base.html para consistência */
        :root {
            --azul-principal: #141C3C; /* Azul do seu base.html */
            --laranja-principal: #FF742E; /* Laranja do seu base.html */
            --branco-fundo: #F2F3F5; /* Branco off-white do seu base.html */
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Contêiner Principal de Tela Cheia com Imagem, Opacidade e Sombra */
        .login-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;

            /* FUNDO TOTAL COM IMAGEM CORPORATIVA */
            background-image: url('{% static "img/background_tech.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Overlay de Opacidade e Sombra do Fundo (Para Contraste do Card) */
        /* Criamos uma div sobreposta para escurecer a imagem de fundo sem afetar o card central */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Overlay azul escuro corporativo com opacidade (rgba(20, 28, 60, 0.7)) */
            background-color: rgba(20, 28, 60, 0.7);
            /* Sombra profunda no fundo (box-shadow) para efeito "dimmed" profissional */
            box-shadow: inset 0 0 150px rgba(0,0,0,0.6);
            z-index: -1;
        }

        /* Card de Login Centralizado e Limpo (Inspirado no estilo TOTVS) */
        .login-card {
            max-width: 480px; /* Largura máxima profissional */
            width: 90%; /* Responsividade para celulares */
            background-color: rgba(255, 255, 255, 0.95); /* Branco off-white translúcido sofisticado */
            border-radius: 1rem; /* Cantos arredondados corporativos modernos */
            /* Sombra profunda e profissional (box-shadow) */
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            padding: 3.5rem; /* Espaçamento interno generoso corporativo */
            z-index: 10; /* Garante que o card fique acima do overlay */
            text-align: left;
        }

        /* Logotipo i9 TMG no topo do card centralizado */
        .logo-card {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .logo-card img {
            max-height: 70px; /* Tamanho proporcional ao card */
            width: auto;
        }

        /* Estilização do Título e Subtítulo Corporativo */
        .login-card h2 {
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        .login-card p.text-muted {
            color: #757575 !important;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        /* Estilização dos Campos de Formulário com Ícones de Segurança */
        .form-label {
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase; /* Padrão ERP profissional */
            letter-spacing: 0.5px;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-color: #dee2e6;
            color: #777;
            padding-left: 1rem;
            padding-right: 1rem;
        }
        .form-control {
            padding: 0.8rem 1.2rem;
            border-radius: 0.5rem;
            border: 1px solid #dee2e6;
            background-color: #fff;
        }
        .form-control:focus {
            border-color: var(--laranja-principal);
            box-shadow: 0 0 0 0.25rem rgba(255, 116, 46, 0.25);
        }

        /* Botão Laranja Corporativo CENTRALIZADO (Largura Total) */
        .btn-login {
            background-color: var(--laranja-principal);
            color: white;
            padding: 0.9rem;
            border-radius: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            border: none;
            width: 100%; /* Botão de largura total centralizado dentro do card */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .btn-login:hover {
            background-color: #e66928;
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(255, 116, 46, 0.2);
        }

        /* Link Esqueceu a senha? Profissional */
        .forgot-link {
            color: var(--laranja-principal);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Alertas de Erro do Django Profissionais (Injetados via form.errors) */
        .alert-danger {
            background-color: #fcece8;
            border-color: #f8d7da;
            color: #dc3545;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        /* Responsividade para telas menores corporativas */
        @media (max-width: 576px) {
            .login-card {
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <div class="logo-card">
                <img src="{% static 'img/logo_card_i9tmg.png' %}" alt="Logo I9TMG" class="img-fluid bg-white rounded-3 p-2 shadow-sm" style="max-height: 150px; width: auto; object-fit: contain;">
            </div>

            {% if form.errors %}
            <div class="alert alert-danger border-0 border-start border-danger border-4 shadow-sm mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Usuário ou senha incorretos. Tente novamente.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary small text-uppercase">Usuário</label>
                    <div class="input-group shadow-sm rounded-3">
                        <span class="input-group-text bg-white border-end-0 text-muted px-3">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label fw-bold text-secondary small text-uppercase mb-0">Senha</label>
                        <a href="#" class="forgot-link"></a>
                    </div>
                    <div class="input-group shadow-sm rounded-3">
                        <span class="input-group-text bg-white border-end-0 text-muted px-3">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="" required>
                    </div>
                </div>

                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-login btn-lg">Entrar<i class="bi bi-box-arrow-in-right ms-2"></i></button>
                </div>

                <input type="hidden" name="next" value="{{ next }}">
            </form>

        </div>
    </div>

</body>
</html>
