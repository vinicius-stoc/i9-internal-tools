<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Alterada | I9TMG ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --azul-principal: #141C3C; --laranja-principal: #FF742E; }
        body { margin: 0; min-height: 100vh; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .auth-container { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; background-image: url('{% static "img/background_tech.png" %}'); background-size: cover; background-position: center; padding: 24px; }
        .auth-container::before { content: ''; position: absolute; inset: 0; background-color: rgba(20, 28, 60, 0.7); box-shadow: inset 0 0 150px rgba(0,0,0,0.6); }
        .auth-card { max-width: 480px; width: 100%; background-color: rgba(255,255,255,0.96); border-radius: 1rem; box-shadow: 0 20px 50px rgba(0,0,0,0.3); padding: 3rem; position: relative; z-index: 1; }
        .btn-primary-i9 { background-color: var(--laranja-principal); color: #fff; border: none; border-radius: 0.5rem; padding: 0.9rem; font-weight: 700; text-decoration: none; display: inline-block; }
        .btn-primary-i9:hover { background-color: #e66928; color: #fff; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card text-center">
            <img src="{% static 'img/logo_card_i9tmg.png' %}" alt="Logo I9TMG" class="img-fluid bg-white rounded-3 p-2 shadow-sm mb-4" style="max-height: 130px;">
            <i class="bi bi-check-circle fs-1 text-success"></i>
            <h1 class="h4 fw-bold mt-3 mb-2">Senha alterada</h1>
            <p class="text-muted mb-4">Seu acesso foi atualizado com sucesso.</p>
            <a href="{% url 'login' %}" class="btn-primary-i9 w-100">Entrar no sistema</a>
        </div>
    </div>
</body>
</html>
