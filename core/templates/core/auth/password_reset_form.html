<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha | I9TMG ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --azul-principal: #141C3C;
            --laranja-principal: #FF742E;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .auth-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: url('{% static "img/background_tech.png" %}');
            background-size: cover;
            background-position: center;
            padding: 24px;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-color: rgba(20, 28, 60, 0.7);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.6);
        }
        .auth-card {
            max-width: 480px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.96);
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            padding: 3rem;
            position: relative;
            z-index: 1;
        }
        .logo-card {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-card img {
            max-height: 130px;
            width: auto;
            object-fit: contain;
        }
        .form-label {
            font-weight: 700;
            color: #555;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-control {
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
        }
        .form-control:focus {
            border-color: var(--laranja-principal);
            box-shadow: 0 0 0 0.25rem rgba(255, 116, 46, 0.25);
        }
        .btn-primary-i9 {
            background-color: var(--laranja-principal);
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.9rem;
            font-weight: 700;
        }
        .btn-primary-i9:hover {
            background-color: #e66928;
            color: #fff;
        }
        .auth-link {
            color: var(--laranja-principal);
            font-weight: 700;
            text-decoration: none;
        }
        .auth-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 576px) {
            .auth-card {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-card">
                <img src="{% static 'img/logo_card_i9tmg.png' %}" alt="Logo I9TMG" class="img-fluid bg-white rounded-3 p-2 shadow-sm">
            </div>

            <h1 class="h4 fw-bold mb-2">Redefinir senha</h1>
            <p class="text-muted mb-4">Informe o e-mail cadastrado para receber o link seguro de redefinicao.</p>

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="{{ form.email.id_for_label }}" class="form-label">E-mail corporativo</label>
                    <div class="input-group shadow-sm rounded-3">
                        <span class="input-group-text bg-white border-end-0 text-muted px-3">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" name="email" autocomplete="email" maxlength="254" required id="{{ form.email.id_for_label }}" class="form-control border-start-0 ps-0">
                    </div>
                    {% if form.email.errors %}
                        <div class="text-danger small mt-2">{{ form.email.errors|striptags }}</div>
                    {% endif %}
                </div>

                <button type="submit" class="btn btn-primary-i9 w-100">
                    Enviar link de redefinicao <i class="bi bi-send ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="auth-link">Voltar para o login</a>
            </div>
        </div>
    </div>
</body>
</html>
